image:
  name: kalrabb/docker-344-v2025:latest

services:
  - postgres:17

variables:
  POSTGRES_DB: swen344
  POSTGRES_USER: swen344
  POSTGRES_PASSWORD: whowatchesthewatchmen
  PYTHON_RUN: python3
  # helps GitPython find git explicitly (most distros place it here)
  GIT_PYTHON_GIT_EXECUTABLE: /usr/bin/git

before_script:
  # install git (works on Debian/Ubuntu OR Alpine)
  - if command -v apt-get >/dev/null 2>&1; then apt-get update && apt-get install -y git; fi
  - if command -v apk >/dev/null 2>&1; then apk add --no-cache git; fi
  - git --version
  - pip install -r requirements.txt
  - cp config/gitlab-credentials.yml config/db.yml

testrunner:
  stage: test
  script:
    - echo "hello class"
    - $PYTHON_RUN --version
    - pytest -q
